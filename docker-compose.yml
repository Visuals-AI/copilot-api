services:
  copilot-api:
    build:
      context: .
    container_name: copilot-api
    ports:
      - "4141:4141"
    volumes:
      - ./copilot-data:/root/.local/share/copilot-api
    networks:
      - new-api-network
    restart: unless-stopped

networks:
  new-api-network:
    external: true
    name: new-api_new-api-network
